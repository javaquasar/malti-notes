<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-labelledby="title desc">
  <title id="title">Lion illustration</title>
  <desc id="desc">A simple decorative card for iljun, lion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1d4"/>
      <stop offset="100%" stop-color="#e7bc65"/>
    </linearGradient>
  </defs>
  <rect width="320" height="220" rx="28" fill="url(#bg)"/>
  <circle cx="72" cy="56" r="18" fill="#ffffff" fill-opacity="0.34"/>
  <circle cx="260" cy="50" r="14" fill="#ffffff" fill-opacity="0.24"/>
  <text x="160" y="122" text-anchor="middle" font-size="84">&#x1F981;</text>
  <text x="160" y="182" text-anchor="middle" font-size="24" font-family="Georgia, serif" fill="#17352f">iljun / lion</text>
